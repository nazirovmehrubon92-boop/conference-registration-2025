<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Регистрация на конференцию</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Регистрация участника конференции</h1>

  <form id="regForm" action="register.php" method="post" novalidate>
    
    <div class="form-grid">
      <div class="form-group full-width">
        <label>ФИО полностью<span class="required">*</span></label>
        <input type="text" name="full_name" required 
               pattern="[А-Яа-яЁё\s\-]+"
               title="Только русские буквы, пробелы и дефис"
               placeholder="Иванов Иван Иванович">
      </div>

      <div class="form-group">
        <label>Телефон<span class="required">*</span></label>
        <input type="tel" name="phone" required
               pattern="\+7[0-9]{10}"
               title="+7 и ровно 10 цифр после"
               placeholder="+79123456789">
      </div>

      <div class="form-group">
        <label>Email<span class="required">*</span></label>
        <input type="email" name="email" required
               placeholder="example@domain.ru">
      </div>

      <div class="form-group">
        <label>Секция<span class="required">*</span></label>
        <select name="section" required>
          <option value="" disabled selected>— выберите секцию —</option>
          <option value="математика">Математика</option>
          <option value="физика">Физика</option>
          <option value="информатика">Информатика</option>
        </select>
      </div>

      <div class="form-group">
        <label>Дата рождения</label>
        <input type="date" name="birth_date">
      </div>

      <div class="form-group radio-group full-width">
        <label>Планируете ли вы делать доклад?</label>
        <label><input type="radio" name="has_report" value="1" required> Да</label>
        <label><input type="radio" name="has_report" value="0" checked> Нет</label>
      </div>

      <div class="form-group full-width" id="report-title-wrapper" style="display:none;">
        <label>Название доклада<span class="required">*</span></label>
        <input type="text" name="report_title" id="report_title" 
               placeholder="Например: Квантовая запутанность в ...">
      </div>
    </div>

    <button type="submit">Отправить регистрацию</button>
  </form>
</div>

<script src="script.js"></script>
</body>
</html>
